# Scraper configuration
# Select analyst LLM with ANALYST_LLM env var (default: "local")
# Browser agent defaults to browser_use; override with AGENT_LLM.

[browser]
# Dedicated automation profile using browser-use's bundled Chromium.
# Sessions persist in this dir across runs. First run: log in manually.
user_data_dir = "data/browser-profile"

[agent]
max_steps = 50
max_failures = 3
max_actions_per_step = 3
detail_max_steps = 10          # max steps for pass-2 detail enrichment per account
step_timeout = 600          # seconds per step
llm_timeout = 300           # seconds per LLM call
use_vision = true
headless = false
enable_planning = false
use_thinking = false
flash_mode = true

[logging]
level = "INFO"

[llm.local]
model = "qwen3.5-scraper:latest"
base_url = "http://localhost:11434/v1"
api_key = "ollama"
timeout = 180.0

# Per-preset observer: when using local, observer is also local (no remote keys needed).
[llm.local.observer]
model = "qwen3.5-scraper:latest"
base_url = "http://localhost:11434/v1"
api_key = "ollama"
timeout = 180.0

[llm.openrouter]
model = "openrouter/hunter-alpha"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
timeout = 60.0
supports_vision = false

[llm.openrouter.observer]
model = "google/gemini-3.1-flash-lite-preview"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
timeout = 60.0

[llm.browser_use]
# browser-use cloud API (optimized for browser automation).
# Requires BROWSER_USE_API_KEY in your environment (for local dev: put it in .env).
model = "bu-2-0"
base_url = "https://llm.api.browser-use.com"
api_key_env = "BROWSER_USE_API_KEY"
timeout = 120.0
supports_vision = true

# Global observer fallback: used when active preset has no nested observer.
[llm.observer]
model = "google/gemini-3.1-flash-lite-preview"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
timeout = 60.0


[statements]
download_dir = "data/statements"
max_steps = 50                  # single agent downloads all accounts
eligible_account_types = ["credit_card", "loan", "line_of_credit"]

